<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="google-site-verification" content="6P8J5zebR-fZ6NI9h7Dn5fXi0yHh3bQd9DNHlbuG6cU" />
  <meta charset="UTF-8">
<title>Ultimate Task Planner</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI;
}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(270deg,#4facfe,#00f2fe,#43e97b,#f093fb);
background-size:800% 800%;
animation:bg 15s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:750px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
padding:25px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
text-align:center;
}

h1{
margin-bottom:10px;
}

.inputs{
margin-bottom:15px;
}

input{
padding:10px;
margin:5px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:10px 18px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#4facfe,#00f2fe);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.task{
background:white;
padding:15px;
margin-top:10px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
text-align:left;
animation:fade 0.5s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.task button{
margin-top:5px;
}

.stats{
margin-top:10px;
font-weight:bold;
}

.dark{
background:#111;
}

.dark .container{
background:#222;
color:white;
}

.dark .task{
background:#333;
color:white;
}

canvas{
max-width:300px;
margin:auto;
}

</style>
</head>

<body>

<div class="container">

<h1>🚀 Smart Task Planner</h1>
<p>Plan your goals and track your progress</p>

<div class="inputs">

<input id="taskName" placeholder="Task name">

<input id="startDate" type="date">

<input id="endDate" type="date">

<br>

<button onclick="addTask()">➕ Add Task</button>
<button onclick="toggleDark()">🌙 Dark</button>

</div>

<h3>📊 Progress</h3>
<canvas id="chart"></canvas>

<div class="stats" id="stats"></div>

<h3>📋 Tasks</h3>
<div id="tasks"></div>

</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[]

const ctx=document.getElementById("chart")

let chart=new Chart(ctx,{
type:"doughnut",
data:{
labels:["Completed","Remaining"],
datasets:[{
data:[0,0],
backgroundColor:["#43e97b","#ff4d4d"]
}]
}
})

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks))
}

function render(){

let list=document.getElementById("tasks")
list.innerHTML=""

let completed=0

tasks.forEach((t,i)=>{

if(t.done) completed++

let today=new Date()
let end=new Date(t.end)

let days=Math.ceil((end-today)/(1000*60*60*24))
if(days<0) days=0

let div=document.createElement("div")
div.className="task"

div.innerHTML=
"<b>"+t.name+"</b><br>"+
"📅 "+t.start+" → "+t.end+
"<br>⏳ Remaining: "+days+" days"+
"<br><button onclick='finishTask("+i+")'>Finish</button>"

if(t.done) div.style.textDecoration="line-through"

list.appendChild(div)

})

let remaining=tasks.length-completed

chart.data.datasets[0].data=[completed,remaining]
chart.update()

document.getElementById("stats").innerHTML=
"✅ Completed: "+completed+
" | ⏳ Remaining: "+remaining+
" | 📋 Total: "+tasks.length

save()

}

function addTask(){

let name=document.getElementById("taskName").value
let start=document.getElementById("startDate").value
let end=document.getElementById("endDate").value

if(name=="") return

tasks.push({
name:name,
start:start,
end:end,
done:false
})

render()

}

function finishTask(i){

tasks[i].done=true
render()

}

function toggleDark(){

document.body.classList.toggle("dark")

}

render()

</script>

</body>
</html>
